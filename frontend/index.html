<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVision X - Autonomous Traffic Enforcement Platform</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        heading: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            main: '#0a0d14',
                            sidebar: '#10141e',
                            card: 'rgba(22, 28, 42, 0.65)',
                            primary: '#00e5ff',
                            success: '#39ff14',
                            warning: '#ff9f1c',
                            danger: '#ff2a5f',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* ======= GLASS MORPHISM ======= */
        .glass-panel {
            background: rgba(15, 23, 42, 0.70);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-panel:hover {
            border-color: rgba(0, 229, 255, 0.20);
            background: rgba(22, 36, 60, 0.80);
            box-shadow: 0 0 24px rgba(0, 229, 255, 0.06);
        }

        /* ======= SCROLLBAR ======= */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ======= NEON GLOW ======= */
        .neon-glow-primary { box-shadow: 0 0 20px rgba(0,229,255,0.3), 0 0 60px rgba(0,229,255,0.1); }
        .neon-glow-danger   { box-shadow: 0 0 20px rgba(255,42,95,0.3), 0 0 60px rgba(255,42,95,0.1); }
        .neon-glow-green    { box-shadow: 0 0 20px rgba(57,255,20,0.3), 0 0 60px rgba(57,255,20,0.1); }
        .neon-glow-purple   { box-shadow: 0 0 20px rgba(139,92,246,0.3), 0 0 60px rgba(139,92,246,0.1); }

        /* ======= STAT CARD GLOW ON VALUE ======= */
        .stat-glow { text-shadow: 0 0 30px currentColor; }

        /* ======= BACKGROUND GRID ======= */
        body {
            background-color: #020617;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ======= SCANLINE OVERLAY ======= */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.04) 2px,
                rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ======= ANIMATED GRADIENT BORDER ======= */
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0,229,255,0.3); box-shadow: 0 0 10px rgba(0,229,255,0.15); }
            50%       { border-color: rgba(0,229,255,0.8); box-shadow: 0 0 30px rgba(0,229,255,0.4); }
        }
        .live-border { animation: borderPulse 2s ease-in-out infinite; }

        /* ======= COUNTER FLASH ANIMATION ======= */
        @keyframes counterFlash {
            0%   { color: #00e5ff; text-shadow: 0 0 20px #00e5ff; }
            100% { color: inherit; text-shadow: none; }
        }
        .counter-flash { animation: counterFlash 0.6s ease-out; }

        /* ======= RADAR SWEEP ======= */
        @keyframes radarSweep {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .radar-sweep { animation: radarSweep 3s linear infinite; transform-origin: center; }

        /* ======= BLINK CURSOR ======= */
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        .blink { animation: blink 1s step-end infinite; }

        /* ======= FADE IN ======= */
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out both; }

        /* ======= SLIDE IN RIGHT ======= */
        @keyframes slideInRight { from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);} }
        .animate-slideInRight { animation: slideInRight 0.4s ease-out both; }

        /* ======= MARQUEE ======= */
        @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-50%);} }
        .marquee-inner { animation: marquee 30s linear infinite; display:flex; width:max-content; }

        /* ======= LIVE PULSE DOT ======= */
        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.85); }
        }
        .live-dot { animation: livePulse 1.2s ease-in-out infinite; }

        /* ======= CARD ENTRANCE ======= */
        @keyframes cardEntrance {
            from { opacity:0; transform: translateY(12px) scale(0.98); }
            to   { opacity:1; transform: translateY(0)   scale(1);    }
        }
        .card-entrance { animation: cardEntrance 0.5s ease-out both; }

        /* ======= SPINNING RING ======= */
        @keyframes spinRing {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .spin-ring { animation: spinRing 8s linear infinite; }

        /* ======= STAT CARD HOVER ======= */
        .stat-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0,229,255,0.12);
        }

        /* ======= TICKER ANIMATION ======= */
        @keyframes tickerSlide {
            0%   { transform: translateX(100%); opacity:0; }
            10%  { opacity:1; }
            90%  { opacity:1; }
            100% { transform: translateX(-100%); opacity:0; }
        }

        /* ======= GRADIENT TEXT ======= */
        .gradient-text {
            background: linear-gradient(135deg, #00e5ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ======= LIGHT THEME OVERRIDES ======= */
        body.light-theme {
            background-color: #f0f4f8 !important;
            background-image: linear-gradient(rgba(0,100,200,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,100,200,0.03) 1px, transparent 1px) !important;
            color: #0f172a !important;
        }
        body.light-theme::before { display: none; }
        body.light-theme .glass-panel {
            background: rgba(255,255,255,0.90) !important;
            border: 1px solid rgba(0,0,0,0.08) !important;
            color: #0f172a !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06) !important;
        }
        body.light-theme .glass-panel:hover {
            border-color: rgba(0,100,200,0.2) !important;
            box-shadow: 0 8px 32px rgba(0,100,200,0.10) !important;
        }
        body.light-theme .glass-panel h2,
        body.light-theme .glass-panel h3,
        body.light-theme .glass-panel h4,
        body.light-theme .glass-panel .text-white { color: #0f172a !important; }
        body.light-theme .glass-panel p,
        body.light-theme .glass-panel .text-slate-400 { color: #475569 !important; }
        body.light-theme .glass-panel .text-slate-300 { color: #1e293b !important; }
        body.light-theme aside { background-color: #ffffff !important; border-right: 1px solid #e2e8f0 !important; }
        body.light-theme aside h1 { color: #0f172a !important; }
        body.light-theme aside button.text-slate-400:hover { background-color: #f1f5f9 !important; color: #0f172a !important; }
        body.light-theme header { background-color: rgba(255,255,255,0.92) !important; border-bottom: 1px solid #e2e8f0 !important; }
        body.light-theme header h2 { color: #0f172a !important; }
        body.light-theme table th { background-color: #f1f5f9 !important; color: #475569 !important; }
        body.light-theme table td { color: #0f172a !important; border-bottom-color: #e2e8f0 !important; }
        body.light-theme .bg-slate-900, body.light-theme .bg-slate-950, body.light-theme .bg-slate-900\/50,
        body.light-theme .bg-slate-900\/40, body.light-theme .bg-slate-900\/60 { background-color: #f8fafc !important; }
        body.light-theme .bg-slate-800\/40, body.light-theme .bg-slate-800\/35, body.light-theme .bg-slate-800\/60,
        body.light-theme .bg-slate-800 { background-color: #f1f5f9 !important; }
        body.light-theme .border-slate-800, body.light-theme .border-slate-700\/60, body.light-theme .border-slate-800\/80 { border-color: #cbd5e1 !important; }
        body.light-theme .text-slate-200 { color: #1e293b !important; }
        body.light-theme .text-slate-300 { color: #334155 !important; }
        body.light-theme .text-slate-400 { color: #475569 !important; }
        body.light-theme .text-slate-500 { color: #334155 !important; }
        body.light-theme input, body.light-theme select { background-color: #fff !important; border-color: #94a3b8 !important; color: #0f172a !important; }
        body.light-theme tr { border-bottom-color: #cbd5e1 !important; }
        body.light-theme .bg-slate-900\/90 { background-color: #0f172a !important; color: #fff !important; }
    </style>
</head>
<body class="h-full font-sans antialiased overflow-hidden selection:bg-cyan-500 selection:text-slate-900">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
